<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RendiFlow IA | Intelligence Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="root" class="root-shell">
    <section id="loginScreen" class="login-screen">
      <div class="login-hero">
        <img class="hero-logo" src="./assets/rendiflow-logo.svg" alt="RendiFlow IA by HACKTECK" />
        <p class="hero-copy">Automatizacion inteligente de documentos, gastos y rendiciones contables.</p>
        <div class="hero-metrics">
          <span><strong>OCR</strong> avanzado</span>
          <span><strong>IA</strong> asistida</span>
          <span><strong>RBAC</strong> multiempresa</span>
        </div>
      </div>

      <form id="loginForm" class="login-card glass-card">
        <div>
          <p class="eyebrow">Acceso seguro</p>
          <h2>Entrar al panel</h2>
          <p class="muted">Usa credenciales API o activa modo demo si el backend no esta disponible.</p>
        </div>

        <label>API base
          <input id="apiBaseInput" type="url" value="http://127.0.0.1:8000/api/v1" required />
        </label>
        <label>Usuario
          <input id="loginUser" type="text" autocomplete="username" placeholder="contador@acme.cl" required />
        </label>
        <label>Password
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="************" />
        </label>
        <label>Empresa / tenant fallback
          <input id="loginTenant" type="text" placeholder="acme" />
        </label>

        <div class="login-actions">
          <button type="submit" class="btn primary">Entrar</button>
          <button id="demoLoginBtn" type="button" class="btn ghost">Modo demo</button>
        </div>
        <p id="loginMessage" class="form-message" role="status"></p>
      </form>
    </section>

    <section id="appScreen" class="app-layout hidden">
      <aside class="sidebar glass-card">
        <div class="brand-block">
          <img class="brand-logo" src="./assets/rendiflow-logo.svg" alt="RendiFlow IA by HACKTECK" />
        </div>

        <nav id="sideNav" class="side-nav" aria-label="Navegacion principal">
          <button data-route="dashboard" class="nav-item active">Dashboard</button>
          <button data-route="documents" class="nav-item">Documentos</button>
          <button data-route="upload" class="nav-item">Carga documental</button>
          <button data-route="reviews" class="nav-item">Revision inteligente</button>
          <button data-route="renditions" class="nav-item">Rendition Studio</button>
          <button data-route="audit" class="nav-item">Auditoria</button>
          <button data-route="observability" class="nav-item">Observabilidad</button>
          <button data-route="settings" class="nav-item">Configuracion</button>
        </nav>

        <div class="sidebar-footer">
          <span class="status-dot ok"></span>
          <span>Sesion protegida</span>
        </div>
      </aside>

      <div class="workspace">
        <header class="topbar glass-card">
          <button id="mobileMenuBtn" class="icon-btn" aria-label="Abrir menu">Menu</button>
          <div class="topbar-title">
            <p id="breadcrumb" class="eyebrow">Inicio / Dashboard</p>
            <h2 id="pageTitle">Dashboard operacional</h2>
          </div>
          <div class="global-search">
            <input id="globalSearch" type="search" placeholder="Buscar documento, proveedor, rendicion..." />
          </div>
          <div class="session-chip">
            <span id="roleBadge" class="badge success">contador</span>
            <div>
              <strong id="sessionUser">-</strong>
              <span id="sessionCompany">-</span>
            </div>
          </div>
          <button id="refreshAllBtn" class="btn secondary">Actualizar</button>
          <button id="logoutBtn" class="btn ghost">Salir</button>
        </header>

        <section id="toastRegion" class="toast-region" aria-live="polite"></section>
        <section id="pageHost" class="page-host"></section>
      </div>
    </section>
  </main>

  <template id="dashboardTemplate">
    <section class="page-grid dashboard-grid">
      <article class="metric-card"><span>Cargados</span><strong data-metric="uploaded">0</strong><em>documentos capturados</em></article>
      <article class="metric-card"><span>Procesados</span><strong data-metric="processed">0</strong><em>OCR/IA finalizado</em></article>
      <article class="metric-card warning"><span>En revision</span><strong data-metric="pending">0</strong><em>requieren decision</em></article>
      <article class="metric-card success"><span>Rendiciones</span><strong data-metric="renditions">0</strong><em>generadas en sesion</em></article>

      <article class="panel-card span-2">
        <div class="panel-heading">
          <div><p class="eyebrow">Flujo documental</p><h3>Pipeline operacional</h3></div>
          <span class="badge neutral">Periodo activo</span>
        </div>
        <div id="pipelineBars" class="pipeline-bars"></div>
      </article>

      <article class="panel-card">
        <div class="panel-heading"><div><p class="eyebrow">Riesgos</p><h3>Alertas criticas</h3></div></div>
        <div id="riskList" class="risk-list"></div>
      </article>

      <article class="panel-card span-3">
        <div class="panel-heading">
          <div><p class="eyebrow">Actividad reciente</p><h3>Ultimos documentos</h3></div>
          <button data-route-jump="documents" class="btn ghost small">Ver centro documental</button>
        </div>
        <div id="recentDocuments" class="data-table-wrap"></div>
      </article>
    </section>
  </template>

  <template id="documentsTemplate">
    <section class="page-stack">
      <div class="module-header panel-card">
        <div><p class="eyebrow">Centro documental</p><h3>Gestion, busqueda y detalle</h3><p class="muted">Tabla operativa con filtros locales y acciones de detalle/procesamiento.</p></div>
        <div class="module-actions"><button data-route-jump="upload" class="btn primary">Carga documental</button></div>
      </div>
      <article class="panel-card">
        <div class="filters-row">
          <input id="documentSearch" type="search" placeholder="Buscar por ID, proveedor, estado..." />
          <select id="documentStatusFilter"><option value="all">Todos los estados</option><option>RECEIVED</option><option>PROCESSED</option><option>COMPLETED</option><option>REVIEW_REQUIRED</option><option>APPROVED</option><option>REJECTED</option></select>
          <button id="exportDocumentsBtn" class="btn secondary">Export CSV</button>
        </div>
        <div id="documentsTable" class="data-table-wrap"></div>
      </article>
      <article id="documentDetailPanel" class="panel-card hidden"></article>
    </section>
  </template>

  <template id="uploadTemplate">
    <section class="page-stack">
      <article class="panel-card upload-studio">
        <div class="panel-heading"><div><p class="eyebrow">Carga documental avanzada</p><h3>Ingreso con validacion previa</h3></div><span class="badge info">PDF - PNG - JPG</span></div>
        <form id="uploadForm" class="upload-form">
          <label id="dropZone" class="drop-zone">
            <input id="uploadFile" type="file" accept="application/pdf,image/png,image/jpeg" multiple />
            <strong>Arrastra documentos aqui</strong>
            <span>o selecciona archivos para encolar y procesar</span>
          </label>
          <div class="form-grid">
            <label>Periodo<input id="uploadPeriod" type="month" /></label>
            <label>Responsable<input id="uploadResponsible" type="text" placeholder="Ana" /></label>
            <label>Centro de costo<input id="uploadCenterCost" type="text" placeholder="FINANZAS" /></label>
            <label>Tipo documento<select id="uploadDocType"><option>Gasto</option><option>Factura</option><option>Boleta</option><option>Internacional</option></select></label>
          </div>
          <button type="submit" class="btn primary">Subir cola</button>
        </form>
      </article>
      <article class="panel-card"><div class="panel-heading"><div><p class="eyebrow">Cola</p><h3>Estado por archivo</h3></div></div><div id="uploadQueue" class="queue-list"></div></article>
    </section>
  </template>

  <template id="reviewsTemplate">
    <section class="review-layout">
      <article class="panel-card review-queue">
        <div class="panel-heading"><div><p class="eyebrow">Revision inteligente</p><h3>Cola priorizada</h3></div><button id="loadReviewsBtn" class="btn secondary small">Recargar</button></div>
        <div id="reviewsQueue" class="review-list"></div>
      </article>
      <article id="reviewDecisionPanel" class="panel-card decision-panel">
        <div class="empty-state"><strong>Selecciona un documento</strong><span>Veras motivos, datos extraidos, overrides y acciones de decision.</span></div>
      </article>
    </section>
  </template>

  <template id="renditionsTemplate">
    <section class="page-stack">
      <article class="panel-card">
        <div class="panel-heading"><div><p class="eyebrow">Rendition Studio</p><h3>Wizard de generacion</h3></div><span class="badge neutral">Plantilla 01-rendicion-gastos-2025</span></div>
        <ol class="steps"><li class="active">Periodo</li><li>Filtros</li><li>Preview</li><li>Validacion</li><li>Descarga</li></ol>
        <form id="renditionForm" class="form-grid rendition-form">
          <label>Periodo<input id="renditionPeriod" type="month" required /></label>
          <label>Responsable<input id="renditionResponsible" type="text" placeholder="Opcional" /></label>
          <label>Centro costo<input id="renditionCenterCost" type="text" placeholder="Opcional" /></label>
          <button type="submit" class="btn primary">Validar y generar</button>
        </form>
        <div id="renditionPreview" class="preview-box"></div>
      </article>
      <article class="panel-card"><div class="panel-heading"><div><p class="eyebrow">Historial</p><h3>Rendiciones generadas</h3></div></div><div id="renditionsHistory" class="data-table-wrap"></div></article>
    </section>
  </template>

  <template id="auditTemplate">
    <section class="page-stack">
      <article class="panel-card">
        <div class="panel-heading"><div><p class="eyebrow">Auditoria</p><h3>Trazabilidad de acciones</h3></div><button id="clearAuditBtn" class="btn ghost small">Limpiar local</button></div>
        <div id="auditTable" class="data-table-wrap"></div>
      </article>
    </section>
  </template>

  <template id="observabilityTemplate">
    <section class="page-stack">
      <article class="panel-card">
        <div class="panel-heading"><div><p class="eyebrow">Observabilidad</p><h3>Estado productivo</h3></div><button id="runHealthBtn" class="btn secondary">Reintentar checks</button></div>
        <div id="healthGrid" class="health-grid"></div>
        <pre id="diagnosticOutput" class="diagnostic-output"></pre>
      </article>
    </section>
  </template>

  <template id="settingsTemplate">
    <section class="settings-layout">
      <article class="panel-card settings-nav"><button class="settings-tab active">Empresas</button><button class="settings-tab">Usuarios</button><button class="settings-tab">Roles</button><button class="settings-tab">Reglas contables</button><button class="settings-tab">Plantillas XLSX</button></article>
      <article class="panel-card"><div class="panel-heading"><div><p class="eyebrow">Configuracion</p><h3>Parametros operativos</h3></div></div><div id="settingsContent" class="settings-content"></div></article>
    </section>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
